name: Build and release CrystalConfig mod

on:
  push:
    branches: ["main", "master"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:
    inputs:
      force_recreate_release:
        description: "Delete and recreate the existing release/tag for this version"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-mod:
    name: Build shadowJar and sources
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Verify Gradle wrapper
        run: |
          test -f gradle/wrapper/gradle-wrapper.jar
          test -s gradle/wrapper/gradle-wrapper.jar

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Read release version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          read_property() {
            local key="$1"
            awk -F= -v key="$key" '$1 == key { value=$2; sub(/^[[:space:]]+/, "", value); sub(/[[:space:]]+$/, "", value); print value; exit }' gradle.properties | tr -d '\r'
          }

          MOD_VERSION="$(read_property mod_version)"
          MINECRAFT_VERSION="$(read_property minecraft_version)"

          if [ -z "$MOD_VERSION" ] || [ -z "$MINECRAFT_VERSION" ]; then
            echo "mod_version and minecraft_version must both be set in gradle.properties" >&2
            exit 1
          fi

          TAG="v${MOD_VERSION}-mc${MINECRAFT_VERSION}"
          RELEASE_NAME="CrystalConfig ${MOD_VERSION} for Minecraft ${MINECRAFT_VERSION}"

          echo "mod_version=$MOD_VERSION" >> "$GITHUB_OUTPUT"
          echo "minecraft_version=$MINECRAFT_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"

          echo "Release tag: $TAG"
          echo "Release name: $RELEASE_NAME"

      - name: Build mod jar and sources jar
        run: ./gradlew --no-daemon buildModWithSources --stacktrace

      - name: Upload mod and sources
        uses: actions/upload-artifact@v6
        with:
          name: crystal-config-${{ steps.version.outputs.mod_version }}-mc${{ steps.version.outputs.minecraft_version }}
          if-no-files-found: error
          path: |
            crystal-config/build/libs/*.jar
            !crystal-config/build/libs/*-dev.jar
            !crystal-config/build/libs/*-javadoc.jar

      - name: Create version tag and GitHub release
        if: github.event_name != 'pull_request' && !startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_NAME: ${{ steps.version.outputs.release_name }}
          MOD_VERSION: ${{ steps.version.outputs.mod_version }}
          MINECRAFT_VERSION: ${{ steps.version.outputs.minecraft_version }}
        shell: bash
        run: |
          set -euo pipefail

          FORCE_RECREATE="${{ github.event_name == 'workflow_dispatch' && inputs.force_recreate_release }}"

          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            if [ "${FORCE_RECREATE}" = "true" ]; then
              echo "::warning::Force recreating ${RELEASE_TAG}. This moves the tag to the current commit."
              gh release delete "${RELEASE_TAG}" --yes --cleanup-tag || true
              git push --delete origin "${RELEASE_TAG}" || true
              git tag -d "${RELEASE_TAG}" || true
            else
              echo "::notice::Release tag ${RELEASE_TAG} already exists. Skipping tag and release creation."
              echo "::notice::Bump mod_version or minecraft_version in gradle.properties, or run this workflow manually with force_recreate_release enabled."
              exit 0
            fi
          fi

          mapfile -t RELEASE_FILES < <(find crystal-config/build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-dev.jar' ! -name '*-javadoc.jar' | sort)

          if [ "${#RELEASE_FILES[@]}" -eq 0 ]; then
            echo "No release jar files found in crystal-config/build/libs" >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -a "${RELEASE_TAG}" -m "${RELEASE_NAME}"
          git push origin "${RELEASE_TAG}"

          cat > release-notes.md <<EOF_NOTES
          Official CrystalConfig release for Minecraft ${MINECRAFT_VERSION}.

          JitPack dependency version:

          \`\`\`kotlin
          modImplementation("com.github.SomeoneOKxD.CrystalConfig:crystal-config:${RELEASE_TAG}")
          \`\`\`

          Built from:

          - mod_version: ${MOD_VERSION}
          - minecraft_version: ${MINECRAFT_VERSION}
          - tag: ${RELEASE_TAG}
          EOF_NOTES

          gh release create "${RELEASE_TAG}" "${RELEASE_FILES[@]}" --title "${RELEASE_NAME}" --notes-file release-notes.md
