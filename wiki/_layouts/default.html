<!doctype html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <a class="skip-link" href="#content">Skip to content</a>
  <div class="shell">
    <aside class="sidebar" aria-label="Wiki navigation">
      <a class="brand" href="{{ '/' | relative_url }}">
        <span class="brand-mark">CC</span>
        <span>
          <strong>CrystalConfig</strong>
          <small>Developer Wiki</small>
        </span>
      </a>

      <nav>
        <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}aria-current="page"{% endif %}>Overview</a>
        <a href="{{ '/pages/install/' | relative_url }}" {% if page.url contains '/pages/install/' %}aria-current="page"{% endif %}>Add to your mod</a>
        <a href="{{ '/pages/autoconfig/' | relative_url }}" {% if page.url contains '/pages/autoconfig/' %}aria-current="page"{% endif %}>AutoConfig setup</a>
        <a href="{{ '/pages/manual/' | relative_url }}" {% if page.url contains '/pages/manual/' %}aria-current="page"{% endif %}>Non-AutoConfig setup</a>
        <a href="{{ '/pages/opening-screens/' | relative_url }}" {% if page.url contains '/pages/opening-screens/' %}aria-current="page"{% endif %}>Opening screens</a>
        <a href="{{ '/pages/persistence/' | relative_url }}" {% if page.url contains '/pages/persistence/' %}aria-current="page"{% endif %}>Persistence</a>
        <a href="{{ '/pages/widgets/' | relative_url }}" {% if page.url contains '/pages/widgets/' %}aria-current="page"{% endif %}>Widgets</a>
        <a href="{{ '/pages/ui-settings/' | relative_url }}" {% if page.url contains '/pages/ui-settings/' %}aria-current="page"{% endif %}>Themes & UI settings</a>
        <a href="{{ '/pages/custom-options/' | relative_url }}" {% if page.url contains '/pages/custom-options/' %}aria-current="page"{% endif %}>Custom options</a>
        <a href="{{ '/pages/sound/' | relative_url }}" {% if page.url contains '/pages/sound/' %}aria-current="page"{% endif %}>Minecraft sound picker</a>
        <a href="{{ '/pages/text-formatting/' | relative_url }}" {% if page.url contains '/pages/text-formatting/' %}aria-current="page"{% endif %}>Text formatting</a>
        <a href="{{ '/pages/porting/' | relative_url }}" {% if page.url contains '/pages/porting/' %}aria-current="page"{% endif %}>Using core elsewhere</a>
      </nav>
    </aside>

    <main id="content" class="content">
      <article class="card">
        {{ content }}
      </article>
    </main>
  </div>
</body>
</html>
